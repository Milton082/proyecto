<div class="group developer-card motion-fade-up" [class.profile-mode]="profileMode">
  <div class="card-inner">
    <div class="card-left">
      <img [src]="getPhotoUrl()" 
           [alt]="'Retrato de ' + developer.name" 
           class="avatar"
           (error)="$any($event.target).src = getAvatarUrl(developer.name)">
    </div>
    <div class="card-body">
      <h3 class="name">{{ developer.name }}</h3>
      <p class="role">{{ developer.role }}</p>
      <p class="tagline">{{ developer.tagline }}</p>
      
      <ng-container *ngIf="showCTA; else contactIcons">
        <a [routerLink]="['/developer', developer.slug]" class="cta">Ver Perfil <span class="arrow">→</span></a>
      </ng-container>
      
      <ng-template #contactIcons>
        <ng-container *ngIf="developer.contact as contact">
          <div class="flex items-center gap-3 pt-2">
            <a *ngIf="contact.github" [href]="contact.github" target="_blank" rel="noreferrer"
               class="grid h-8 w-8 place-items-center rounded-md border border-white/[0.06] bg-white/[0.02] text-slate-400 hover:border-cyan-500/40 hover:text-cyan-400 transition-all">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-4 w-4">
                <path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.22.68-.48 0-.24-.01-.87-.01-1.71-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.63.07-.62.07-.62 1.01.07 1.54 1.04 1.54 1.04.9 1.54 2.36 1.1 2.94.84.09-.65.35-1.1.64-1.35-2.22-.25-4.56-1.11-4.56-4.95 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.57 9.57 0 0 1 12 6.8c.85 0 1.7.11 2.5.33 1.9-1.29 2.74-1.02 2.74-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.85-2.34 4.7-4.57 4.95.36.31.68.92.68 1.86 0 1.34-.01 2.42-.01 2.75 0 .26.18.57.69.48A10.002 10.002 0 0 0 22 12c0-5.52-4.48-10-10-10Z"/>
              </svg>
            </a>
            <a *ngIf="contact.linkedin" [href]="contact.linkedin" target="_blank" rel="noreferrer"
               class="grid h-8 w-8 place-items-center rounded-md border border-white/[0.06] bg-white/[0.02] text-slate-400 hover:border-cyan-500/40 hover:text-cyan-400 transition-all">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-4 w-4">
                <path d="M4.98 3.5C4.98 4.88 3.86 6 2.48 6S0 4.88 0 3.5 1.12 1 2.5 1 4.98 2.12 4.98 3.5zM.25 24h4.5V7.75h-4.5V24zm7.5-16.5h4.31v2.17h.06c.6-1.13 2.06-2.33 4.25-2.33 4.55 0 5.39 3 5.39 6.9V24h-4.5v-7.61c0-1.82-.03-4.16-2.54-4.16-2.54 0-2.93 1.98-2.93 4.03V24h-4.5V7.5z"/>
              </svg>
            </a>
            <a *ngIf="contact.email" [href]="'mailto:' + contact.email"
               class="grid h-8 w-8 place-items-center rounded-md border border-white/[0.06] bg-white/[0.02] text-slate-400 hover:border-cyan-500/40 hover:text-cyan-400 transition-all">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-4 w-4">
                <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 2 8 5-8-5h16zm0 12H4V8l8 5 8-5v10z"/>
              </svg>
            </a>
            <a *ngIf="contact.email" [href]="'mailto:' + contact.email"
               class="inline-flex items-center gap-2 px-4 py-2 bg-white/[0.04] hover:bg-white/[0.08] border border-white/10 text-slate-300 hover:text-white text-xs font-semibold rounded-xl transition-all no-underline">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
              </svg>
              Contáctame
            </a>

            <!-- Enlace para abrir el formulario de solicitud en el perfil del desarrollador -->
            <a [routerLink]="['/developer', developer.slug]" fragment="contact" class="inline-flex items-center gap-2 px-4 py-2 bg-cyan-500/10 hover:bg-cyan-500/20 border border-cyan-500/30 text-cyan-300 hover:text-white text-xs font-semibold rounded-xl transition-all no-underline">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3.5 h-3.5">
                <path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 10h4v2h-4v4h-2v-4H7v-2h4V8h2v4z"/>
              </svg>
              Enviar solicitud
            </a>
          </div>
        </ng-container>
      </ng-template>
    </div>
  </div>
</div>
