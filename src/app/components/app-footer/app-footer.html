<footer class="w-full bg-[#0B0F19] border-t border-white/[0.05] text-slate-400 relative z-10 block motion-fade-up motion-fade-up-delay-150">
  <div class="mx-auto grid max-w-5xl gap-8 px-6 py-16 md:grid-cols-3">
    <div class="space-y-4">
      <div class="text-xl font-bold text-white tracking-wide">
        Milton<span class="text-cyan-400"> & </span>Jefferson
      </div>
      <p class="max-w-sm text-sm text-slate-400 leading-relaxed">{{ description }}</p>
    </div>

    <div>
      <h3 class="text-xs font-semibold uppercase tracking-[0.2em] text-cyan-400">Enlaces rápidos</h3>
      <ul class="mt-4 space-y-2.5 text-sm p-0 list-none">
        <li *ngFor="let link of quickLinks">
          <a [routerLink]="['/']" [fragment]="link.id" class="transition-colors hover:text-white text-slate-400 no-underline cursor-pointer">
            {{ link.label }}
          </a>
        </li>
      </ul>
    </div>

    <div>
      <h3 class="text-xs font-semibold uppercase tracking-[0.2em] text-cyan-400">Redes sociales</h3>
      <div class="mt-4 flex items-center gap-3">
        <a
          *ngFor="let social of socials"
          [href]="social.href"
          target="_blank"
          rel="noreferrer"
          class="grid h-10 w-10 place-items-center rounded-xl border border-white/[0.08] bg-white/[0.01] text-slate-400 transition-all hover:border-cyan-500/40 hover:text-cyan-400 hover:shadow-[0_0_12px_rgba(34,211,238,0.15)] no-underline"
          [attr.aria-label]="social.label"
        >
          <ng-container [ngSwitch]="social.icon">
            <svg *ngSwitchCase="'github'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-5 w-5">
              <path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.22.68-.48 0-.24-.01-.87-.01-1.71-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.63.07-.62.07-.62 1.01.07 1.54 1.04 1.54 1.04.9 1.54 2.36 1.1 2.94.84.09-.65.35-1.1.64-1.35-2.22-.25-4.56-1.11-4.56-4.95 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.57 9.57 0 0 1 12 6.8c.85 0 1.7.11 2.5.33 1.9-1.29 2.74-1.02 2.74-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.85-2.34 4.7-4.57 4.95.36.31.68.92.68 1.86 0 1.34-.01 2.42-.01 2.75 0 .26.18.57.69.48A10.002 10.002 0 0 0 22 12c0-5.52-4.48-10-10-10Z" fill="currentColor" />
            </svg>
            <svg *ngSwitchCase="'linkedin'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-5 w-5">
              <path d="M4.98 3.5C4.98 4.88 3.86 6 2.48 6S0 4.88 0 3.5 1.12 1 2.5 1 4.98 2.12 4.98 3.5zM.25 24h4.5V7.75h-4.5V24zm7.5-16.5h4.31v2.17h.06c.6-1.13 2.06-2.33 4.25-2.33 4.55 0 5.39 3 5.39 6.9V24h-4.5v-7.61c0-1.82-.03-4.16-2.54-4.16-2.54 0-2.93 1.98-2.93 4.03V24h-4.5V7.5z" fill="currentColor" />
            </svg>
            <svg *ngSwitchCase="'mail'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-5 w-5">
              <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 2-8 5-8-5h16zm0 12H4V8l8 5 8-5v10z" fill="currentColor" />
            </svg>
          </ng-container>
        </a>
      </div>
    </div>
  </div>

  <div class="border-t border-white/[0.05] py-6 text-center text-xs text-slate-500 tracking-wide">
    &copy; {{ year }} {{ brand }}. Todos los derechos reservados.
  </div>
</footer>
