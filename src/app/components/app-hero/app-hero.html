<section id="inicio" class="relative min-h-[85vh] flex flex-col items-center justify-center bg-[#0B0F19] px-6 md:px-12 pt-28 pb-16 overflow-hidden w-full motion-fade-up">
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-[500px] bg-gradient-to-b from-cyan-500/[0.03] to-transparent blur-3xl pointer-events-none motion-floating"></div>

  <div class="w-full max-w-5xl mx-auto text-center relative z-10 flex flex-col items-center space-y-6">
    <span class="inline-flex items-center gap-2 rounded-full border border-white/[0.06] bg-white/[0.01] backdrop-blur-md px-4 py-1.5 text-[11px] font-semibold text-slate-400">
      <span class="h-1.5 w-1.5 rounded-full bg-cyan-400 animate-pulse"></span>
      Disponibles para nuevos proyectos
    </span>

    <h1 class="text-5xl md:text-7xl font-black tracking-tight text-white max-w-4xl leading-[1.1]">
      Desarrolladores de <br>
      <span class="bg-gradient-to-r from-cyan-400 via-sky-400 to-blue-500 bg-clip-text text-transparent">
        Software
      </span>
    </h1>

    <p class="max-w-2xl text-sm leading-relaxed text-slate-400 sm:text-base mx-auto px-4">
      Somos Milton y Jefferson, un equipo apasionado por la tecnología. Construimos aplicaciones web y móviles modernas, rápidas y centradas en las personas.
    </p>

    <div class="grid gap-6 sm:grid-cols-2 w-full max-w-4xl pt-8">
      @for (developer of developers(); track developer.name) {
        <app-developer-card [developer]="developer"></app-developer-card>
      }
    </div>
  </div>
</section>
