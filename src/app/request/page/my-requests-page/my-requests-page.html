<div class="min-h-screen bg-[#0B0F19] text-white p-8 pt-20">
  <h1 class="text-3xl font-bold text-cyan-400 mb-8">Mis Solicitudes</h1>

  @if (requests().length === 0) {
    <div class="alert">No tienes solicitudes registradas.</div>
  } @else {
    <div class="space-y-4">
      @for (request of requests(); track request.id) {
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-6">
          <p class="text-slate-300 mb-4">
            {{ request.projectDescription }}
          </p>

          <div class="flex justify-between items-center">
            <span class="badge">
              {{ request.developerSlug }}
            </span>

            <span
              class="badge"
              [class.badge-warning]="request.status === 'Pendiente'"
              [class.badge-success]="request.status === 'Respondida'"
            >
              {{ request.status }}
            </span>
          </div>
        </div>
      }
    </div>
  }
</div>
